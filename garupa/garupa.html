<!DOCTYPE html>
<meta charset="utf-8">
<head>
    <title>
        邦邦盲盒
    </title>
    <link rel="icon" href="garupa.png">
</head>
<script src="goods.js"></script>
<style>
    .跳转烤
    {
        color: rgb(0,188,208);
        position: relative;
        left: 40px;
    }
    .跳转
    {
        position: relative;
        left: 30px;
        top: 20px;
        width: 158px;
        height: 100px;
        border-width:5px ;
        border-color:rgb(0,188,208) ;
        border-style:dashed ;
    }
    .main
    {
        text-align: center;
        margin-left: auto;
    }
    .选盒
    {
        width: 200px;
        height: 30px;
        text-align: center;
    }
    .盒图
    {
        height: 300px;
    }
    .开包区
    {
        z-index: -2;
        position: relative;
        top: 50px;
        text-align: center;
        margin: auto;
        border-width:5px ;
        border-color:rgb(229,0,79) ;
        border-style:dashed ;
        width: 200px;
        height: 330px;
    }
</style>
<div class="跳转">
    <input class="prsk" type="image" src="../prsk/prsk.png" height="60" onclick="window.location.href='../prsk/prsk.html'">
    <p class="跳转烤">切换成烤</p>
</div>
<div class="main">
    <h1>选择要抽的盒</h1>
    <img class="盒图" src="garupa.png" alt="展示盒" id="展示盒">
    <br>
    <select name="选盒" id="选盒" class="选盒">
        <option value="NULL">---选择一个盒---</option>
        <option value="甜品天堂吧唧">甜品天堂吧唧</option>
        <option value="甜品天堂相卡">甜品天堂相卡</option>
        <option value="gigo杯垫">gigo杯垫</option>
        <option value="gigo拍立得">gigo拍立得</option>
        <option value="v2星挂1">v2星挂1</option>
        <option value="v2星挂2">v2星挂2</option>
    </select>
    <br>
    <button onclick="展示盒()">确定</button>
    <br>
    <input id="开包" type="image" height="150" src="../透明.png" onclick="开谷子()">
</div>
<div class="开包区">
    <h2>开包区</h2>
    <br>
    <img src="../透明.png" alt="开包区" id="开包区" width="150">
</div>
